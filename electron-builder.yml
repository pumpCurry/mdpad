appId: jp.542.mdpad
productName: mdpad
copyright: "(C) pumpCurry, 5r4ce2"

directories:
  output: build28

files:
  - src/**/*
  - dist/**/*
  - package.json
  - build-number.json
  - "!**/*.map"
  - "!**/node_modules/**"
  - "!**/*.tmp.*"

# Don't use asar — our renderer loads CSS files via <link> with relative paths
asar: false

extraMetadata:
  description: mdpad

fileAssociations:
  - ext: md
    name: "Markdown File"
    description: "Markdownファイル"
    role: Editor
  - ext: markdown
    name: "Markdown File"
    description: "Markdownファイル"
    role: Editor

win:
  target:
    - target: dir
      arch:
        - x64
  icon: assets/icons/icon.ico
  legalTrademarks: ""

portable:
  artifactName: "mdpad-${env.MDPAD_DISPLAY_VERSION}-portable.exe"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: "mdpad-${env.MDPAD_DISPLAY_VERSION}-setup.exe"
  include: "build/installer.nsh"

# Build portable zip:
# npm run build:zip
