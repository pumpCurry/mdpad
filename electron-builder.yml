appId: jp.542.mdpad
productName: mdpad
copyright: "(C) pumpCurry, 5r4ce2"

directories:
  output: build30

files:
  - src/**/*
  - dist/**/*
  - package.json
  - build-number.json
  - "!**/*.map"
  - "!**/node_modules/**"
  - "!**/*.tmp.*"

# Don't use asar — our renderer loads CSS files via <link> with relative paths
asar: false

extraMetadata:
  description: mdpad
  author: "5r4ce2"

# fileAssociations は installer.nsh のカスタムページで管理する。
# electron-builder の fileAssociations と installer.nsh の _WriteShellEntry が
# 異なるレジストリパスに書き込むため、二重登録（ページ重複表示）の原因になっていた。
# installer.nsh のカスタムページに一本化することで、ユーザー選択に基づく登録のみ行う。

win:
  target:
    - target: dir
      arch:
        - x64
  icon: assets/icons/icon.ico
  legalTrademarks: ""

portable:
  artifactName: "mdpad-${env.MDPAD_DISPLAY_VERSION}-portable.exe"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: "mdpad-${env.MDPAD_DISPLAY_VERSION}-setup.exe"
  include: "build/installer.nsh"

# Build portable zip:
# npm run build:zip
